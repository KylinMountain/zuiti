name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一分支的新提交取消旧的运行
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Typecheck（双 tsconfig）
        run: npm run typecheck

      - name: Test（含架构 lint）
        run: npm test
