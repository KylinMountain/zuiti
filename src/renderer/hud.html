<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>嘴替</title>
  <link rel="stylesheet" href="hud.css" />
</head>
<body>
  <div class="hud">
    <header class="hud__bar">
      <span class="hud__title">嘴替</span>
      <span class="hud__hint">你负责想，它负责嘴</span>
    </header>

    <section class="hud__input">
      <textarea id="text" placeholder="说句真心话…（带情绪、口语都行）" rows="3"></textarea>
      <div class="hud__row">
        <label class="hud__check"><input type="checkbox" id="screenshot" checked /> 看屏</label>
        <button id="go">替我说</button>
      </div>
      <div class="hud__row hud__row--voice">
        <button id="mic" class="hud__mic" type="button" aria-label="点一下说话">
          <span class="hud__mic-dot"></span>
          <span class="hud__mic-label">点一下说话</span>
        </button>
        <label class="hud__check"><input type="checkbox" id="vadAuto" checked /> VAD 自动停</label>
        <label class="hud__check"><input type="checkbox" id="wakeListen" /> 耳听八方（喊 Jarvis）</label>
        <span id="voiceState" class="hud__voicestate" hidden></span>
      </div>
    </section>

    <section id="status" class="hud__status" hidden></section>

    <section id="result" class="hud__result" hidden>
      <article class="card card--reply">
        <div class="card__chip">嘴替推荐</div>
        <p id="reply" class="card__text"></p>
        <button class="card__copy" data-target="reply">复制</button>
      </article>
      <div id="candidates" class="hud__candidates"></div>
      <p id="rationale" class="hud__rationale"></p>
    </section>

    <!-- Plan 6: explain/summarize 阅读视图 -->
    <section id="readingView" class="hud__reading" hidden>
      <article class="card card--reading">
        <div class="card__chip card__chip--reading">看屏讲解</div>
        <h3 id="readingTitle" class="card__reading-title"></h3>
        <p id="readingContent" class="card__reading-content"></p>
        <ul id="readingBullets" class="card__reading-bullets"></ul>
      </article>
    </section>
  </div>

  <script type="module" src="hud.js"></script>
</body>
</html>
