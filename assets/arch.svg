<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420" role="img" aria-label="架构分层">
  <rect width="900" height="420" fill="#FFF6EE"/>
  <g font-family="PingFang SC, system-ui, sans-serif">
    <!-- Layers bottom to top -->
    <rect x="120" y="340" width="660" height="56" rx="12" fill="#FFFFFF" stroke="rgba(24,19,32,0.12)"/>
    <text x="450" y="374" text-anchor="middle" font-size="16" font-weight="700" fill="#181320">Types</text>
    <text x="450" y="392" text-anchor="middle" font-size="11" fill="#7C7689">zod schema · CHANNELS · WakeRuntime</text>

    <rect x="120" y="276" width="660" height="56" rx="12" fill="#FFFFFF" stroke="rgba(24,19,32,0.12)"/>
    <text x="450" y="310" text-anchor="middle" font-size="16" font-weight="700" fill="#181320">Config / Providers</text>
    <text x="450" y="328" text-anchor="middle" font-size="11" fill="#7C7689">provider.ts · MiMo OpenAI 兼容 · .env</text>

    <rect x="120" y="212" width="660" height="56" rx="12" fill="#FFFFFF" stroke="rgba(24,19,32,0.12)"/>
    <text x="450" y="246" text-anchor="middle" font-size="16" font-weight="700" fill="#181320">Core</text>
    <text x="450" y="264" text-anchor="middle" font-size="11" fill="#7C7689">streamparse · skill · voice · screenshot · wakeword · log</text>

    <rect x="120" y="148" width="660" height="56" rx="12" fill="#FFFFFF" stroke="rgba(24,19,32,0.12)"/>
    <text x="450" y="182" text-anchor="middle" font-size="16" font-weight="700" fill="#181320">Modules</text>
    <text x="450" y="200" text-anchor="middle" font-size="11" fill="#7C7689">reply · explain · summarize · router（Plan 6）</text>

    <rect x="120" y="84" width="660" height="56" rx="12" fill="#FF2D6B" opacity="0.08" stroke="#FF2D6B" stroke-opacity="0.3"/>
    <text x="450" y="118" text-anchor="middle" font-size="16" font-weight="700" fill="#B3104A">Main (Runtime)</text>
    <text x="450" y="136" text-anchor="middle" font-size="11" fill="#7C7689">Electron · window · tray · ipc · preload · wake 模型下发</text>

    <rect x="120" y="20" width="660" height="56" rx="12" fill="#221334"/>
    <text x="450" y="54" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">Renderer (UI)</text>
    <text x="450" y="72" text-anchor="middle" font-size="11" fill="#CDBFE0">hud · openWakeWord · vad · wav（esbuild 打包）</text>

    <!-- Up arrow on left -->
    <path d="M 80 380 L 80 40" stroke="#FF2D6B" stroke-width="2" marker-end="url(#uparrow)" stroke-dasharray="4 3"/>
    <text x="40" y="220" text-anchor="middle" font-size="11" fill="#B3104A" font-weight="700" transform="rotate(-90 40 220)">依赖向前</text>
  </g>
  <defs>
    <marker id="uparrow" viewBox="0 0 10 10" refX="5" refY="1" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 10 L 5 0 L 10 10 z" fill="#FF2D6B"/>
    </marker>
  </defs>
</svg>
